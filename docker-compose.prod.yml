version: "3.8"

services:
  pgdb:
    image: postgres:15
    container_name: pgdb
    restart: always
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdb_data:/var/lib/postgresql/data
    networks:
      - market_vision_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: maksig/market-vision-backend:latest
    container_name: backend
    restart: always
    expose:
      - "8000"
    depends_on:
      pgdb:
        condition: service_healthy
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=pgdb
      - POSTGRES_PORT=5432
      - DB_ENGINE=django.db.backends.postgresql
      - DEBUG=0
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend,51.250.17.35
      - CORS_ALLOWED_ORIGINS=http://localhost,http://127.0.0.1,http://51.250.17.35
    networks:
      - market_vision_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, json; response = urllib.request.urlopen('http://localhost:8000/api/health/'); data = json.loads(response.read()); exit(0 if data.get('status') == 'healthy' else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: maksig/market-vision-frontend:latest
    container_name: frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - market_vision_network

networks:
  market_vision_network:
    driver: bridge

volumes:
  pgdb_data: 
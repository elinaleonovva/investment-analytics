version: "3.8"

services:
  pgdb:
    image: postgres:15
    container_name: pgdb
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: market_vision_db
      POSTGRES_USER: market_vision_user
      POSTGRES_PASSWORD: market_vision_password
    volumes:
      - pgdb_data:/var/lib/postgresql/data
    networks:
      - market_vision_network

  backend:
    build: 
      context: ./market-vision-backend
      dockerfile: Dockerfile
    container_name: backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - pgdb
    environment:
      - POSTGRES_DB=market_vision_db
      - POSTGRES_USER=market_vision_user
      - POSTGRES_PASSWORD=market_vision_password
      - POSTGRES_HOST=pgdb
      - POSTGRES_PORT=5432
      - DB_ENGINE=django.db.backends.postgresql
      - DEBUG=1
      - SECRET_KEY=dev-secret-key-change-me
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend,0.0.0.0
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost:8000,http://127.0.0.1:8000,http://localhost,http://127.0.0.1,http://localhost:80,http://frontend
    networks:
      - market_vision_network

  frontend:
    build:
      context: ./market-vision-frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - market_vision_network

networks:
  market_vision_network:
    driver: bridge

volumes:
  pgdb_data:
